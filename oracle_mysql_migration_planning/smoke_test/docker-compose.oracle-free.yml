services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: omm_oracle_free
    ports:
      - "${ORACLE_HOST_PORT:-15211}:1521"
    environment:
      ORACLE_PASSWORD: "${ORACLE_PASSWORD:-oracle123}"
      APP_USER: "${APP_USER:-OMM_APP}"
      APP_USER_PASSWORD: "${APP_USER_PASSWORD:-omm_app_pwd}"
    volumes:
      - ../sql:/workspace/sql:ro
      - ./reports:/workspace/reports
      - ./seed:/workspace/seed:ro
